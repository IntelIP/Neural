name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,trading]

      - name: Lint
        run: |
          ruff --version
          ruff check .
          black --check .

      - name: Type check
        run: |
          mypy --version
          mypy neural

      - name: Run tests
        env:
          KALSHI_EMAIL: ${{ secrets.KALSHI_EMAIL || '' }}
          KALSHI_PASSWORD: ${{ secrets.KALSHI_PASSWORD || '' }}
          KALSHI_API_BASE: ${{ secrets.KALSHI_API_BASE || 'https://api.elections.kalshi.com' }}
        run: |
          pytest -q

  package-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel "setuptools>=77"

      - name: Build source distribution
        run: |
          python -m build --sdist --wheel --no-isolation

      - name: Create clean smoke environment
        run: |
          python -m venv /tmp/neural-smoke-venv
          /tmp/neural-smoke-venv/bin/python -m pip install --upgrade pip
          /tmp/neural-smoke-venv/bin/python -m pip install dist/*.whl

      - name: Verify installed package imports
        run: |
          cd /tmp
          /tmp/neural-smoke-venv/bin/python "${GITHUB_WORKSPACE}/scripts/package_smoke.py"

      - name: Verify sdist install path
        run: |
          python -m venv /tmp/neural-sdist-smoke-venv
          /tmp/neural-sdist-smoke-venv/bin/python -m pip install --upgrade pip
          /tmp/neural-sdist-smoke-venv/bin/python -m pip install "setuptools>=77" wheel
          /tmp/neural-sdist-smoke-venv/bin/python -m pip install --no-build-isolation dist/*.tar.gz
          cd /tmp
          /tmp/neural-sdist-smoke-venv/bin/python "${GITHUB_WORKSPACE}/scripts/package_smoke.py"
